name: Deploy assignment05 to GitHub Pages

on:
  push:
    branches: ["prod"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show files being deployed
        run: |
          echo "Current directory:"
          pwd

          echo "Repo files:"
          find . -maxdepth 4 -type f | sort

          echo "Assignment05 files:"
          find ./assignments/assignment05 -maxdepth 2 -type f | sort

          echo "Checking for required index.html..."
          test -f ./assignments/assignment05/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload assignment05 artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./assignments/assignment05

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
