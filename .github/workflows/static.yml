# Simple workflow for deploying static content to GitHub Pages
name: Deploy assignment05 to GitHub Pages

on:
  push:
    branches: ["prod"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload assignment05 artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./assignments/assignment05/index.html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
